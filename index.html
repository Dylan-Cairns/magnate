<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnate</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #05080f;
        color: #fafcff;
        font-family: 'Chakra Petch', 'Trebuchet MS', sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .app-bootstrap-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(
            ellipse 90% 70% at 50% 50%,
            rgba(78, 108, 157, 0.29) 0%,
            rgba(47, 68, 104, 0.16) 34%,
            rgba(14, 21, 36, 0.05) 68%,
            rgba(8, 13, 24, 0) 80%
          ),
          radial-gradient(
            ellipse 145% 120% at 50% 50%,
            rgba(0, 0, 0, 0) 40%,
            rgba(1, 4, 12, 0.62) 84%,
            rgba(0, 2, 8, 0.86) 100%
          );
      }

      .app-bootstrap-card {
        width: min(24rem, 100%);
        border: 1px solid rgba(125, 94, 73, 0.62);
        border-radius: 14px;
        padding: 1.1rem 1.2rem;
        background: rgba(8, 11, 18, 0.8);
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.62);
      }

      .app-bootstrap-title {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 0.03em;
      }

      .app-bootstrap-copy {
        margin: 0.45rem 0 0;
        color: rgba(200, 208, 220, 0.92);
        font-size: 0.95rem;
      }

      .app-bootstrap-bar {
        margin-top: 0.85rem;
        height: 0.3rem;
        border-radius: 999px;
        background: rgba(56, 69, 89, 0.82);
        overflow: hidden;
        position: relative;
      }

      .app-bootstrap-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 45%;
        transform: translateX(-115%);
        border-radius: inherit;
        background: var(--accent, #e0b986);
        animation: app-bootstrap-progress 1.2s ease-in-out infinite;
      }

      @keyframes app-bootstrap-progress {
        0% {
          transform: translateX(-115%);
        }
        60% {
          transform: translateX(175%);
        }
        100% {
          transform: translateX(175%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-bootstrap-shell" role="status" aria-live="polite">
        <section class="app-bootstrap-card">
          <h1 class="app-bootstrap-title">Magnate</h1>
          <p class="app-bootstrap-copy">Loading game interface...</p>
          <div class="app-bootstrap-bar" aria-hidden="true"></div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
