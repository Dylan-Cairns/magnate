name: Bug report
description: Report a problem found while playing Magnate
title: "Bug report"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please attach the `magnate-log-*.json` file downloaded from the game.
  - type: textarea
    id: report
    attributes:
      label: Bug report
      value: |
        ## What happened?


        ## What did you expect to happen?


        ## Notes


        ## Log file
        (Attach the downloaded magnate-log-*.json file here)
    validations:
      required: true
