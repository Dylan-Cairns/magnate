name: Bug report
description: Report a problem found while playing Magnate
title: "Bug report"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please attach the `magnate-bug-report-*.json` file downloaded from the game.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add anything else that may help reproduce the issue.
    validations:
      required: false
  - type: textarea
    id: log-file
    attributes:
      label: Log file
      description: Attach the downloaded magnate bug report JSON file here.
      placeholder: Drag and drop magnate-bug-report-*.json into this box.
    validations:
      required: true
